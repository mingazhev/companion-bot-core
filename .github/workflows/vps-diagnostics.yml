name: VPS Diagnostics

on:
  workflow_dispatch:
    inputs:
      tail:
        description: "How many log lines to show"
        required: false
        default: "300"

jobs:
  diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: Collect VPS logs
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            cd /opt/companion-bot-core

            echo "=== docker compose ps ==="
            docker compose -f docker-compose.vps.yml ps

            echo "=== bot env model settings ==="
            grep -E '^(CHAT_MODEL|REFINEMENT_MODEL|OPENAI_BASE_URL|USE_FAKE_ADAPTERS)=' .env || true

            echo "=== bot logs (tail=${{ github.event.inputs.tail || '300' }}) ==="
            docker compose -f docker-compose.vps.yml logs --tail=${{ github.event.inputs.tail || '300' }} bot
